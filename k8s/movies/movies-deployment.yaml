apiVersion: apps/v1
kind: Deployment
metadata:
  name: movies
spec:
  replicas: 3
  selector:
    matchLabels:
      app: movies
  template:
    metadata:
      labels:
        app: movies
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: movies
              topologyKey: zone
      topologySpreadConstraints:
         - maxSkew: 1
           topologyKey: kubernetes.io/hostname   # ← on cible le nœud physique/logique
           whenUnsatisfiable: ScheduleAnyway     # ← OPTIONNEL : si impossible, on schedule quand même
           labelSelector:                        # ← on cible TOUTES les apps
            matchExpressions:
              - key: app
                operator: Exists                # ← tous les pods qui ont une label "app"
      containers:
        - name: movies
          image: microservices:1.0
          command: ["./movies"]
          # startupProbe:
          #   httpGet:
          #     path: /health
          #     port: 8080
          #   initialDelaySeconds: 10
          #   periodSeconds: 5
          #   failureThreshold: 30
          # readinessProbe:
          #   httpGet:
          #     path: /ready
          #     port: 8080
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
          #   failureThreshold: 3
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8080
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
          #   failureThreshold: 3
          ports:
            - containerPort: 8080