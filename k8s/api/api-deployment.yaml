apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: microservices:1.0
          command: ["./api"]
          env:
            - name: BOOKS_API_HOST
              value: "books"
            - name: MOVIES_API_HOST
              value: "movies"
          ports:
            - containerPort: 8080
